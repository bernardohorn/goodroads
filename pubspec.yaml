name: goodroads
description: Sistema de registro de ocorrências em estradas rurais da GRB.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado e navegação
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2

  # Rede e serialização
  dio: ^5.9.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.2.10

  # Mapas e localização
  google_maps_flutter: ^2.14.0
  geolocator: ^13.0.4
  permission_handler: ^11.4.0

  # Mídia e armazenamento
  image_picker: ^1.2.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.3

  # Utilitários
  flutter_dotenv: ^5.2.1
  connectivity_plus: ^6.1.5
  uuid: ^4.5.1
  intl: ^0.20.2
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

  assets:
    - assets/imagens/
    - assets/icones/
    - assets/configuracao/
